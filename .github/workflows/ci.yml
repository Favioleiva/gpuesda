name: Non-CUDA package validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check src tests scripts benchmarks

      - name: Run non-CUDA tests
        run: >-
          python -m pytest -q
          --ignore=tests/test_backend.py
          --ignore=tests/test_cpu_gpu_equivalence.py
          --ignore=tests/test_raster_operator.py
          --ignore=tests/test_raster_permutations.py

      - name: Compile Python sources
        run: python -m compileall -q src tests scripts benchmarks
